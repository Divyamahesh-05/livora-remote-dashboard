<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Livora</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="assets/image1.png" type="image/png">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#1f2937,#111827);
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:#1e293b;
      border-radius:15px;
      padding:30px;
      box-shadow:0 8px 20px rgba(0,0,0,.3);
      text-align:center;
    }

    h2{
      color:#60a5fa;
      margin-bottom:25px;
    }

    #url-list{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .url-button{
      padding:15px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      background:#2563eb;
      color:white;
      transition:.3s;
    }

    .url-button:hover{
      background:#1d4ed8;
      transform:scale(1.02);
    }

    .status{
      color:#cbd5e1;
      font-size:15px;
    }
  </style>
</head>

<body>

<div class="container">

<h2>🚀 Livora Tunnel Links</h2>

<div id="url-list">
<div class="status">Loading...</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDIGIrpmU1DLzmvbb1yiZ8QzeYqKWKvbgw",
    authDomain: "remote-tunnel-acfff.firebaseapp.com",
    databaseURL: "https://remote-tunnel-acfff-default-rtdb.firebaseio.com",
    projectId: "remote-tunnel-acfff",
    storageBucket: "remote-tunnel-acfff.firebasestorage.app",
    messagingSenderId: "356321481090",
    appId: "1:356321481090:web:b17a6b025c8d8d4fbdbf9b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list=document.getElementById("url-list");

onValue(ref(db,"tunnels"),(snapshot)=>{

    list.innerHTML="";

    if(!snapshot.exists()){
        list.innerHTML="<div class='status'>No Devices Found</div>";
        return;
    }

    const data=snapshot.val();

    Object.keys(data).forEach(device=>{

        const btn=document.createElement("button");

        btn.className="url-button";

        btn.innerText=device;

        btn.onclick=()=>{
            window.open(data[device].url,"_blank");
        };

        list.appendChild(btn);

    });

});

</script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")
.then(()=>console.log("Service Worker Registered"))
.catch(err=>console.log(err));

}

</script>

</body>
</html>
